<!doctype html> 
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Expense Tracker</title>
  </head>
  <body>
    <div id="app">
      <div class="app">
        <header>
          <h1>Expense Tracker</h1>
        </header>

        <section class="summary">
          <div class="card balance">
            <span class="label">Total Balance</span>
            <span class="value" data-balance>$0.00</span>
          </div>
          <div class="card income">
            <span class="label">Total Income</span>
            <span class="value" data-income>$0.00</span>
          </div>
          <div class="card expense">
            <span class="label">Total Expenses</span>
            <span class="value" data-expense>$0.00</span>
          </div>
        </section>

        <section class="chart-section">
          <h2>Overview</h2>
          <div class="chart-container">
            <div class="chart-bar-group">
              <div class="chart-bar income" data-chart-income></div>
              <span class="chart-label">Income</span>
            </div>
            <div class="chart-bar-group">
              <div class="chart-bar expense" data-chart-expense></div>
              <span class="chart-label">Expense</span>
            </div>
          </div>
        </section>

        <section class="form-section">
          <h2>Add Transaction</h2>
          <form data-form class="transaction-form">
            <input type="text" data-title placeholder="Title" required />
            <input type="number" data-amount placeholder="Amount" min="0.01" step="0.01" required />
            <select data-type>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
            <button type="submit">Add Transaction</button>
          </form>
        </section>

        <section class="transactions-section">
          <div class="transactions-header">
            <h2>Transactions</h2>
            <select data-filter class="filter-select">
              <option value="all">All</option>
              <option value="income">Income</option>
              <option value="expense">Expense</option>
            </select>
          </div>
          <div class="transactions-list" data-transactions-list>
            <div class="empty-state">No transactions yet.</div>
          </div>
        </section>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
